<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>كافيه السعادة</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="header">
    <h2>take your time</h2>
    <br />
    <p>coffee is not only to drink it gives happiness in life</p>
  </div>

  <hr />
  <hr />

  <div class="menu">
    <h1>our products</h1>
    <hr />
  </div>

  <div class="product">
    <div class="photo-card">
      <img src="pepsi.jpg" alt="كانز بيبسي">
      <div class="quantity-price-box">
        <span class="item-price">25 EGP</span>
        <div class="quantity-control">
          <button class="control-btn minus-btn">-</button>
          <span class="quantity-number">0</span> <button class="control-btn plus-btn">+</button> 
        </div>
      </div>
      <button class="order-now">order now</button>
    </div>
  </div> 

  <div class="product">
    <div class="photo-card">
      <img src="cocacola.jpg" alt="كانز كوكاكولا">
      <div class="quantity-price-box">
        <span class="item-price">30 EGP</span>
        <div class="quantity-control">
          <button class="control-btn minus-btn">-</button>
          <span class="quantity-number">0</span>
          <button class="control-btn plus-btn">+</button>
        </div>
      </div>
      <button class="order-now">order now</button>
    </div>
  </div>

  <div class="product">
    <div class="photo-card">
      <img src="latte.jpg" alt="كوب لاتيه">
      <div class="quantity-price-box">
        <span class="item-price">45 EGP</span>
        <div class="quantity-control">
          <button class="control-btn minus-btn">-</button>
          <span class="quantity-number">0</span>
          <button class="control-btn plus-btn">+</button>
        </div>
      </div>
      <button class="order-now">order now</button>
    </div>
  </div>

  <div class="product">
    <button class="order-all-btn">order all now 🛒</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
